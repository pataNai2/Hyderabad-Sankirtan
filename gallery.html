<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Hyderabad Sankirtan Gallery</title>

<style>

body{
margin:0;
font-family:Arial, sans-serif;
color:#5f4831;
background:url("bg.png") no-repeat center center/cover;
position:relative;
}

/* overlay */
body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(250,246,241,0.7);
z-index:-1;
}

/* header */
.header{
text-align:center;
padding:30px 20px;
}

.logo{
width:120px;
max-width:40%;
}

/* title */
.title{
font-size:28px;
font-weight:bold;
margin-top:10px;
}

/* gallery grid */
.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:30px;
max-width:1100px;
margin:auto;
}

/* image box */
.photo{
background:rgba(250,246,241,0.5);
border:2px solid black;
padding:10px;
border-radius:10px;
}

.photo img{
width:100%;
border-radius:8px;
display:block;
}

/* back button */
.back{
text-align:center;
margin:20px;
}

.back a{
text-decoration:none;
font-weight:bold;
color:#5f4831;
background:rgba(250,246,241,0.5);
border:2px solid black;
padding:10px 20px;
border-radius:8px;
display:inline-block;
}

.back a:hover{
background:#faf6f1;
}

/* mobile tweaks */
@media(max-width:600px){

.title{
font-size:22px;
}

.gallery{
padding:20px;
gap:15px;
}

}

</style>
</head>
